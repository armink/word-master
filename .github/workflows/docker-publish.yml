name: 构建并发布 Docker 镜像

on:
  # main 分支：等 CI workflow 全部通过后才触发
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  # tag 推送（发版）和手动触发：直接执行，不依赖 CI workflow
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: 构建并推送 Docker 镜像
    runs-on: ubuntu-latest
    # workflow_run 触发时：仅 CI 成功才继续；tag/手动触发时：直接执行
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write   # 推送到 ghcr.io 需要此权限

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录容器镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像元数据（tag / label）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 推送 main 分支时打 latest tag
            type=raw,value=latest,enable={{is_default_branch}}
            # 推送 v1.2.3 tag 时同时打 1.2.3 和 1.2 和 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: 设置 Docker Buildx（支持多平台）
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 利用 GitHub Actions 缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
